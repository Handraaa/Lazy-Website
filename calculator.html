<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>Lazy list</title>
        <link rel="stylesheet" href="style-calculator.css">
        <link rel="stylesheet" href="style-universal.css">
        <link rel="icon" type="image/x-icon" href="nyan cat.png">
    </head>
    <body>
        <header>
            <h1>Lazy Calculator</h1>
        </header>
        <main>
            <div class="calculator">
                <div class="calculation-result">
                    <div class="current-action"></div>
                    <div class="previous-action"></div>
                </div>
                <button class="clear col-dwa">C</button>
                <button class="remove">DEL</button>
                <button class="operator">√</button>
                <button class="operator">÷</button>
                <button class="number">1</button>
                <button class="number">2</button>
                <button class="number">3</button>
                <button class="operator">^</button>
                <button class="operator">X</button>
                <button class="number">4</button>
                <button class="number">5</button>
                <button class="number">6</button>
                <button class="operator">%</button>
                <button class="operator">log</button>
                <button class="number">7</button>
                <button class="number">8</button>
                <button class="number">9</button>
                <button class="number">•</button>
                <button class="operator row-dwa">+</button>
                <button class="number">0</button>
                <button class="equality col-dwa">=</button>
                <button class="operator">-</button>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
